<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>空よみ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-top">
      <h1>空よみ</h1>
      <button id="refresh-btn" aria-label="データを更新">↺</button>
    </div>
    <div id="gps-status" class="status">📍 現在地を取得中…</div>
  </header>

  <main>
    <section id="chart-map-section">
      <div class="section-header">
        <h2>天気図／降水レーダー</h2>
      </div>
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="chart">
          <span class="tab-label">🗺 天気図</span>
          <span id="chart-time" class="tab-time"></span>
        </button>
        <button class="tab-btn" data-tab="radar">
          <span class="tab-label">🌧 降水レーダー</span>
          <span id="radar-time" class="tab-time"></span>
        </button>
      </div>
      <div id="tab-chart" class="tab-panel">
        <div id="weather-chart" class="chart-container"></div>
        <p class="chart-hint">ピンチ or スクロールでズーム ／ ダブルタップでリセット</p>
      </div>
      <div id="tab-radar" class="tab-panel tab-hidden">
        <div id="weather-map"></div>
      </div>
    </section>

    <section id="ai-section">
      <div class="section-header">
        <h2>AI解説</h2>
      </div>
      <div id="ai-commentary" class="forecast-container">
        <p class="placeholder">予報データ読み込み後に生成されます</p>
      </div>
    </section>

    <section id="forecast-section">
      <div class="section-header">
        <h2>3日間予報</h2>
        <span class="section-time">気象庁発表</span>
      </div>
      <div id="forecast-cards"></div>
      <div id="forecast" class="forecast-container">
        <p class="placeholder">読み込み中…</p>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
