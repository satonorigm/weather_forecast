<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天気図</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>天気図</h1>
    <div id="gps-status" class="status">📍 現在地を取得中…</div>
  </header>

  <main>
    <section id="weather-chart-section">
      <div class="section-header">
        <h2>地上天気図</h2>
        <span id="chart-time" class="radar-time"></span>
      </div>
      <div id="weather-chart" class="chart-container">
        <p class="placeholder">天気図を読み込み中…</p>
      </div>
    </section>

    <section id="weather-map-section">
      <div class="section-header">
        <h2>降水レーダー</h2>
        <span id="radar-time" class="radar-time"></span>
      </div>
      <div id="weather-map"></div>
    </section>

    <section id="forecast-section">
      <h2>3日間予報</h2>
      <div id="forecast-cards"></div>
      <div id="forecast" class="forecast-container">
        <p class="placeholder">予報データを読み込み中…</p>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
